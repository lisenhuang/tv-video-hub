name: android

on:
  push:
    branches: ["**"]
    paths:
      - "android-tv/**"
      - ".github/workflows/android-build.yml"
  pull_request:
    paths:
      - "android-tv/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch:

# Build the Android APK, then (on the default branch, when secrets are present)
# publish it to the backend so installed apps can self-update.
jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Optional release signing — provide these repo secrets for installable,
      # self-updatable release APKs (Android requires a stable signing key across
      # versions). Without them the build falls back to the debug key.
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
      KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
      KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      # Publish target — set repo variable BACKEND_URL and secret RELEASE_API_KEY.
      BACKEND_URL: ${{ vars.BACKEND_URL }}
      RELEASE_API_KEY: ${{ secrets.RELEASE_API_KEY }}
      # Baked into BuildConfig as the first-run default base URL (repo variable).
      ORG_GRADLE_PROJECT_backendBaseUrl: ${{ vars.BACKEND_BASE_URL }}
    defaults:
      run:
        working-directory: android-tv
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Decode keystore
        if: ${{ env.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/release.keystore"
          echo "KEYSTORE_FILE=$RUNNER_TEMP/release.keystore" >> "$GITHUB_ENV"

      - name: Build release APK
        run: gradle :app:assembleRelease --no-daemon --stacktrace

      - name: Locate APK and read version
        id: apk
        run: |
          APK=$(find app/build/outputs/apk/release -name "*.apk" | head -n1)
          echo "path=$APK" >> "$GITHUB_OUTPUT"
          gradle -q :app:printVersion --no-daemon > version.txt
          echo "versionCode=$(grep versionCode version.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"
          echo "versionName=$(grep versionName version.txt | cut -d= -f2)" >> "$GITHUB_OUTPUT"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tv-video-hub-apk
          path: android-tv/${{ steps.apk.outputs.path }}

      # Publish to the backend release endpoint so the app's self-update can find it.
      - name: Publish APK to backend
        if: ${{ github.ref == 'refs/heads/main' && env.BACKEND_URL != '' && env.RELEASE_API_KEY != '' }}
        run: |
          curl -fsS -X POST "${BACKEND_URL%/}/api/app/releases" \
            -H "X-Api-Key: $RELEASE_API_KEY" \
            -F "apk=@${{ steps.apk.outputs.path }}" \
            -F "versionCode=${{ steps.apk.outputs.versionCode }}" \
            -F "versionName=${{ steps.apk.outputs.versionName }}" \
            -F "minSdk=23" \
            -F "notes=CI build ${GITHUB_SHA::7} from ${GITHUB_REF_NAME}"
          echo "Published versionCode=${{ steps.apk.outputs.versionCode }} to backend."
